site_name: Zen Mode Demo
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - search.highlight
    - toc.follow
    - content.code.copy

plugins:
  - search
  - zen-mode:
      max_width: "780px"
      shortcut: "Alt+Z"
